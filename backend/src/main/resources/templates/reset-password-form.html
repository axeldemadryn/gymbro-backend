<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Restablecer contraseña</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 400px;
            margin: 50px auto;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>
    <h2>Restablecer contraseña</h2>

    <!-- Mostrar mensajes de error -->
    <div th:if="${mensaje}" th:text="${mensaje}" style="color:red; margin-bottom: 15px;"></div>

    <form th:action="@{/api/users/reset-password}" method="post">
        <input type="hidden" name="token" th:value="${token}" />
        <input type="password" name="password" placeholder="Nueva contraseña" required />
        <input type="password" name="confirmPassword" placeholder="Repetir contraseña" required />
        <button type="submit">Cambiar contraseña</button>
    </form>

</body>

</html>
