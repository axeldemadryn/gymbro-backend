<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <title>Restablecer contraseña - GymBro</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0d0d0d;
            color: #e6e6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #111;
            padding: 40px 50px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 420px;
        }

        h2 {
            color: #1e90ff;
            margin-bottom: 25px;
            font-size: 22px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background-color: #1b1b1b;
            color: #e6e6e6;
            font-size: 14px;
        }

        input::placeholder {
            color: #888;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #1e90ff, #007bff);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s ease-in-out;
        }

        button:hover {
            background: linear-gradient(90deg, #007bff, #0056b3);
            box-shadow: 0 0 12px rgba(30, 144, 255, 0.6);
            transform: translateY(-1px);
        }

        .mensaje {
            color: #ff4c4c;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Restablecer contraseña</h2>

        <div th:if="${mensaje}" th:text="${mensaje}" class="mensaje"></div>

        <form th:action="@{/api/users/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}" />
            <input type="password" name="password" placeholder="Nueva contraseña" required />
            <input type="password" name="confirmPassword" placeholder="Repetir contraseña" required />
            <button type="submit">Cambiar contraseña</button>
        </form>
    </div>
</body>

</html>
