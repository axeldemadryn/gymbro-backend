spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.devtools.restart.enabled=false

roboflow.api.key=${ROBOFLOW_API_KEY}
roboflow.model=${ROBOFLOW_MODEL}
roboflow.base.url=${ROBOFLOW_BASE_URL}

openai.api.key=${OPENAI_API_KEY}
openai.base.url=${OPENAI_BASE_URL}
openai.model=${OPENAI_MODEL}

spring.web.resources.static-locations=file:/app/static/

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Mailgun (PRODUCCIÓN)
spring.mail.host=smtp.mailgun.org
spring.mail.port=587
spring.mail.username=${MAILGUN_SMTP_USERNAME}
spring.mail.password=${MAILGUN_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.mailgun.org

# Email remitente (tu dominio verificado)
spring.mail.properties.mail.smtp.from=${MAIL_FROM}

# App base URL
app.base.url=https://api-gymbromachine.codelordo.com

# ✅ Carpeta para imágenes de usuarios (PROD - montada desde VPS)
app.imagenes.usuarios.path=${APP_IMAGENES_USUARIOS_PATH:/app/imagenes_usuarios}
