services:

  mailpit:
    image: axllent/mailpit
    container_name: gymbro_mailpit
    restart: always
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # Web UI
      
  database:
    image: postgres:alpine
    container_name: gymbro_database
    restart: always
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: gymbro_backend
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - database
    environment:
      SPRING_PROFILES_ACTIVE: prod
      
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      
      ROBOFLOW_API_KEY: ${ROBOFLOW_API_KEY}
      ROBOFLOW_MODEL: ${ROBOFLOW_MODEL}
      ROBOFLOW_BASE_URL: ${ROBOFLOW_BASE_URL}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}

      # ✅ AGREGAR ESTA LÍNEA:
      APP_IMAGENES_USUARIOS_PATH: /app/imagenes_usuarios

    volumes:
      - /var/www/api-gymbroMachine/static/imagenes:/app/static/imagenes
      # ✅ Imágenes de usuarios (reconocimientos) - PERSISTENTE
      - /var/www/api-gymbroMachine/imagenes_usuarios:/app/imagenes_usuarios

volumes:
  postgres_data: